name: CI

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]
  workflow_call: {}
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (${{ matrix.module }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        module: [".", "file", "syslog", "webhook"]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up go.work
        run: go work init . file syslog webhook

      - name: Check gofmt
        run: |
          DIFF=$(cd ${{ matrix.module }} && gofmt -l .)
          if [ -n "$DIFF" ]; then
            echo "Files not formatted in ${{ matrix.module }}:"
            echo "$DIFF"
            exit 1
          fi

      - name: Run go vet
        run: cd ${{ matrix.module }} && go vet ./...

      # goinstall builds golangci-lint from source with the Go 1.26
      # toolchain since prebuilt binaries do not yet support Go 1.26.
      # Switch back to install-mode: binary when available.
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.1.6
          install-mode: goinstall
          working-directory: ${{ matrix.module }}

  validate-release:
    name: Validate GoReleaser Config
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate GoReleaser config
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          args: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  check-replace:
    name: No Replace Directives
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Reject replace directives
        run: |
          FAILED=0
          for mod in . file syslog webhook; do
            if grep -q "^replace " "$mod/go.mod" 2>/dev/null; then
              echo "ERROR: $mod/go.mod contains replace directive"
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then exit 1; fi

  test:
    name: Test (${{ matrix.module }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        module: [".", "file", "syslog", "webhook"]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up go.work
        run: go work init . file syslog webhook

      - name: Run unit tests
        run: cd ${{ matrix.module }} && go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5.5.3
        with:
          files: ${{ matrix.module }}/coverage.out
          flags: ${{ matrix.module == '.' && 'core' || matrix.module }}
          fail_ci_if_error: false

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up go.work
        run: go work init . file syslog webhook

      - name: Run integration tests
        run: |
          cd file && go test -race -count=1 -tags=integration ./tests/integration/...
          cd ../syslog && go test -race -count=1 -tags=integration ./tests/integration/...

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up go.work
        run: go work init . file syslog webhook

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          for mod in . file syslog webhook; do
            echo "=== govulncheck $mod ==="
            (cd $mod && govulncheck ./...) || exit 1
          done

      - name: Verify go.sum integrity
        run: |
          for mod in . file syslog webhook; do
            echo "=== go mod verify $mod ==="
            (cd $mod && go mod verify) || exit 1
          done

  cross-build:
    name: Cross Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint]
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up go.work
        run: go work init . file syslog webhook

      - name: Build all modules
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          for mod in . file syslog webhook; do
            echo "=== build $mod ==="
            (cd $mod && go build ./...) || exit 1
          done

  ci-pass:
    name: CI Pass
    runs-on: ubuntu-latest
    needs: [lint, test, integration, security, cross-build, check-replace, validate-release]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          if [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "One or more required jobs were cancelled"
            exit 1
          fi
          echo "All CI checks passed"
