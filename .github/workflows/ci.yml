name: CI

on:
  push:
    branches: [main, 'feature/**', 'fix/**', 'chore/**', 'refactor/**']
  pull_request:
    branches: [main]
  workflow_call: {}
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Job dependency chain (fail-fast ordering):
#   changes — detects docs-only PRs; outputs.code = true/false
#   hygiene (fmt, tidy, replace, todos) — always runs
#   validate-release — always runs (independent)
#   lint (vet, golangci-lint) — needs: hygiene; SKIPPED for docs-only
#   security x12 matrix (govulncheck per module) — needs: hygiene; SKIPPED for docs-only; parallelised via matrix (#522)
#   security-verify (go mod verify) — needs: hygiene; SKIPPED for docs-only
#   test x7 matrix — needs: lint; SKIPPED for docs-only
#   cross-build — needs: lint; SKIPPED for docs-only
#   integration — needs: test; SKIPPED for docs-only
#   bdd x6 matrix — needs: test; SKIPPED for docs-only
#   bdd-verify — needs: bdd; SKIPPED for docs-only; verifies all scenarios were executed
#   benchmark — needs: test; SKIPPED for docs-only; SKIPPED on PRs/feature branches
#   ci-pass — allows "skipped" results for docs-only PRs
#   dependency-review — PR-only, blocks PRs adding vulnerable dependencies

jobs:
  # Detect whether code changed or only docs/markdown changed.
  # Docs-only PRs skip test, build, integration, BDD, and benchmark jobs.
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Check for code changes
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event_name }}" = "workflow_call" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # For PRs, diff against the base branch. For pushes, diff against parent.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi

          # If BASE is empty or all zeros (new branch), run everything.
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Verify base commit is reachable (handles force-pushes).
          if ! git cat-file -e "$BASE" 2>/dev/null; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            echo "Base commit $BASE not reachable — running full CI"
            exit 0
          fi

          # Check if any non-docs files changed.
          # ':!*.md' matches .md at all directory levels in git pathspec.
          CHANGED=$(git diff --name-only "$BASE" HEAD -- \
            ':!*.md' \
            ':!docs/**' \
            ':!LICENSE' \
            ':!.claude/**' \
          )

          if [ -z "$CHANGED" ]; then
            echo "code=false" >> "$GITHUB_OUTPUT"
            echo "Docs-only change detected — skipping test/build jobs"
          else
            echo "code=true" >> "$GITHUB_OUTPUT"
            echo "Code changes detected:"
            echo "$CHANGED" | head -20
          fi

  # Requires Dependency Graph enabled in repo settings:
  # https://github.com/axonops/audit/settings/security_analysis
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high

  hygiene:
    name: Hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up go.work
        run: make workspace

      - name: Cache Go tools
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/go/bin
          key: go-tools-${{ runner.os }}-${{ hashFiles('Makefile') }}

      - name: Install tools
        run: make install-tools

      - name: Check formatting
        run: make fmt-check

      - name: Check module tidiness
        run: make tidy-check

      - name: Check orphaned TODOs
        run: make check-todos

      - name: Check replace directives
        run: make check-replace

      - name: Check example README cross-references
        run: make check-example-links

      # BDD Strict-mode guard — MUST run before any test matrix so a
      # regression fails loudly and early, not buried inside a later
      # test job. There is NO circumstance under which BDD runners may
      # disable Strict mode — see memory feedback_bdd_strict_mode.md
      # and CONTRIBUTING.md "BDD Strict mode" section.
      - name: Verify BDD Strict mode is enabled everywhere
        run: make check-bdd-strict

      # Benchmark-baseline freshness guard — reject a PR that introduces
      # a stale benchmark name to bench-baseline.txt (renames are the
      # classic way to silently disable benchstat column pairing and
      # break the regression gate). See #493 and
      # scripts/bench-baseline-check.sh for details.
      - name: Verify bench-baseline.txt references only current names
        run: make bench-baseline-check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [hygiene, changes]
    if: needs.changes.outputs.code == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up go.work
        run: make workspace

      - name: Cache Go tools
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/go/bin
          key: go-tools-${{ runner.os }}-${{ hashFiles('Makefile') }}

      - name: Install tools
        run: make install-tools

      - name: Run go vet
        run: make vet-all

      - name: Run golangci-lint
        run: make lint-all

  validate-release:
    name: Validate GoReleaser Config
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate GoReleaser config
        uses: goreleaser/goreleaser-action@e24998b8b67b290c2fa8b7c14fcfa7de2c5c9b8c # v7.1.0
        with:
          args: check

  test:
    name: Test (${{ matrix.module }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, changes]
    if: needs.changes.outputs.code == 'true'
    strategy:
      matrix:
        include:
          - module: "."
            target: test-core
            flag: core
          - module: file
            target: test-file
            flag: file
          - module: syslog
            target: test-syslog
            flag: syslog
          - module: webhook
            target: test-webhook
            flag: webhook
          - module: loki
            target: test-loki
            flag: loki
          - module: outputconfig
            target: test-outputconfig
            flag: outputconfig
          - module: cmd/audit-gen
            target: test-audit-gen
            flag: audit-gen
          - module: cmd/audit-validate
            target: test-audit-validate
            flag: audit-validate
          - module: secrets
            target: test-secrets
            flag: secrets
          - module: secrets/openbao
            target: test-secrets-openbao
            flag: secrets-openbao
          - module: secrets/vault
            target: test-secrets-vault
            flag: secrets-vault
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up go.work
        run: make workspace

      - name: Run unit tests with coverage
        run: make ${{ matrix.target }}

      - name: Upload coverage
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: ${{ matrix.module }}/coverage.out
          flags: ${{ matrix.flag }}
          fail_ci_if_error: false

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test, changes]
    if: needs.changes.outputs.code == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up go.work
        run: make workspace

      - name: Start test infrastructure
        run: make test-infra-up

      - name: Run integration tests
        run: make test-integration

      - name: Stop test infrastructure
        if: always()
        run: make test-infra-down

  bdd:
    name: BDD (${{ matrix.suite }})
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.timeout }}
    needs: [test, changes]
    if: needs.changes.outputs.code == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          # Core scenarios: no Docker required
          - suite: core
            target: test-bdd-core
            infra-up: ""
            infra-down: ""
            timeout: 8
          # Output config BDD: no Docker required
          - suite: outputconfig
            target: test-bdd-outputconfig
            infra-up: ""
            infra-down: ""
            timeout: 5
          # File output: no Docker required
          - suite: file
            target: test-bdd-file
            infra-up: ""
            infra-down: ""
            timeout: 5
          # Syslog: needs syslog-ng container
          - suite: syslog
            target: test-bdd-syslog
            infra-up: test-infra-syslog-up
            infra-down: test-infra-syslog-down
            timeout: 8
          # Webhook + routing: needs webhook-receiver container
          - suite: webhook
            target: test-bdd-webhook
            infra-up: test-infra-webhook-up
            infra-down: test-infra-webhook-down
            timeout: 8
          # Loki (excluding fan-out): needs Loki containers
          - suite: loki
            target: test-bdd-loki
            infra-up: test-infra-loki-up
            infra-down: test-infra-loki-down
            timeout: 10
          # Fan-out: needs all containers (syslog + webhook + loki)
          - suite: fanout
            target: test-bdd-fanout
            infra-up: test-infra-up
            infra-down: test-infra-down
            timeout: 10
          # Secrets: needs OpenBao + Vault containers with dev-tls
          - suite: secrets
            target: test-bdd-secrets
            infra-up: test-infra-openbao-up test-infra-vault-up
            infra-down: test-infra-openbao-down test-infra-vault-down
            timeout: 8
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up go.work
        run: make workspace

      - name: Start test infrastructure
        if: matrix.infra-up != ''
        run: make ${{ matrix.infra-up }}

      - name: Run BDD tests
        shell: bash
        run: |
          set -eo pipefail
          make ${{ matrix.target }} 2>&1 | tee /tmp/bdd-output.txt

      - name: Extract scenario count
        if: always()
        shell: bash
        run: |
          set -eo pipefail
          # Count executed scenarios from go test -v subtest output.
          # Each scenario becomes a "--- PASS: Test*Features/..." or "--- FAIL: Test*Features/..." line.
          # Match both TestFeatures (main suite) and TestOutputConfigFeatures (outputconfig suite).
          if [ -f /tmp/bdd-output.txt ]; then
            count=$(grep -cE '^\s*--- (PASS|FAIL): Test(OutputConfig)?(Docker)?Features/' /tmp/bdd-output.txt || echo 0)
          else
            count=0
          fi
          echo "$count" > /tmp/bdd-count.txt
          echo "BDD suite '${{ matrix.suite }}' executed $count scenarios"

      - name: Upload scenario count
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bdd-count-${{ matrix.suite }}
          path: /tmp/bdd-count.txt
          retention-days: 1

      - name: Stop test infrastructure
        if: always() && matrix.infra-down != ''
        run: make ${{ matrix.infra-down }}

  bdd-verify:
    name: BDD Coverage Verification
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [bdd, changes]
    if: needs.changes.outputs.code == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Static tag coverage check
        run: make test-bdd-verify

      - name: Download all scenario counts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: bdd-count-*
          path: /tmp/bdd-counts

      - name: Verify executed scenario totals
        shell: bash
        run: |
          set -eo pipefail
          expected=$(./scripts/count-bdd-scenarios.sh tests/bdd/features outputconfig/tests/bdd/features)
          echo "Expected total scenarios: $expected"

          # Sum all runner counts.
          actual=0
          for count_file in /tmp/bdd-counts/bdd-count-*/bdd-count.txt; do
            if [ -f "$count_file" ]; then
              suite_name=$(basename "$(dirname "$count_file")" | sed 's/bdd-count-//')
              n=$(cat "$count_file")
              echo "  $suite_name: $n scenarios"
              actual=$((actual + n))
            fi
          done
          echo "Actual total executed:    $actual"

          if [ "$actual" -ne "$expected" ]; then
            echo ""
            echo "FAIL: scenario count mismatch!"
            echo "  Expected: $expected (from feature files)"
            echo "  Actual:   $actual (sum of runner executions)"
            echo ""
            echo "This means some scenarios were not executed by any runner."
            echo "Check that all feature files have appropriate tags and that"
            echo "the BDD matrix runner tag expressions cover all scenarios."
            exit 1
          fi

          echo ""
          echo "PASS: all $expected scenarios were executed across the BDD matrix."

  security:
    name: Security Scan (${{ matrix.module }})
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [hygiene, changes]
    if: needs.changes.outputs.code == 'true'
    strategy:
      # Fail-fast=false so one vulnerable module does not cancel
      # the scan for the other 11 — operators want to see the
      # full matrix of findings, not just the first one.
      fail-fast: false
      matrix:
        # Keep this list in sync with $(MODULES) in Makefile.
        module:
          - "."
          - file
          - iouring
          - syslog
          - webhook
          - loki
          - outputconfig
          - outputs
          - cmd/audit-gen
          - cmd/audit-validate
          - secrets
          - secrets/openbao
          - secrets/vault
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up go.work
        run: make workspace

      - name: Cache Go tools
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/go/bin
          key: go-tools-${{ runner.os }}-${{ hashFiles('Makefile') }}

      - name: Install tools
        run: make install-tools

      - name: Run govulncheck for ${{ matrix.module }}
        run: make security-one MOD=${{ matrix.module }}

  security-verify:
    # Companion job that runs the cross-module module-hygiene
    # check. Kept out of the Security Scan matrix because it
    # operates on the workspace as a whole, not per-module.
    name: Security Verify
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [hygiene, changes]
    if: needs.changes.outputs.code == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up go.work
        run: make workspace

      - name: Verify go.sum integrity
        run: make verify

  cross-build:
    name: Cross Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, changes]
    if: needs.changes.outputs.code == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up go.work
        run: make workspace

      - name: Build all platforms
        run: make build-all

      - name: Build examples
        run: make test-examples

  # Benchmarks removed from CI — GitHub Actions runners have inconsistent
  # performance, making results unreliable for comparison. Run benchmarks
  # locally on consistent hardware: make bench && make bench-compare
  ci-pass:
    name: CI Pass
    runs-on: ubuntu-latest
    needs: [changes, hygiene, lint, test, integration, bdd, bdd-verify, security, security-verify, cross-build, validate-release]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          # Docs-only PRs skip test/build jobs (result = "skipped").
          # Only "failure" and "cancelled" are errors.
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          if [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "One or more required jobs were cancelled"
            exit 1
          fi
          echo "All CI checks passed (skipped jobs are OK for docs-only changes)"
