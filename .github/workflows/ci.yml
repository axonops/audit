name: CI

on:
  push:
    branches: [main, 'feature/**', 'fix/**', 'chore/**', 'refactor/**']
  pull_request:
    branches: [main]
  workflow_call: {}
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Job dependency chain (fail-fast ordering):
#   hygiene (fmt, tidy, replace, todos) — no deps, runs immediately
#   validate-release — no deps, runs immediately (independent)
#   lint (vet, golangci-lint) — needs: hygiene
#   security (govulncheck, go mod verify) — needs: hygiene
#   test x5 matrix — needs: lint (transitively: hygiene)
#   cross-build — needs: lint (transitively: hygiene)
#   integration — needs: test (transitively: lint, hygiene)
#   bdd — needs: test (transitively: lint, hygiene)
#   benchmark — needs: test (transitively: lint, hygiene)
#   ci-pass — explicit needs for all required jobs (always() aggregation)
#   dependency-review — PR-only, blocks PRs adding vulnerable dependencies

jobs:
  # Requires Dependency Graph enabled in repo settings:
  # https://github.com/axonops/go-audit/settings/security_analysis
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high

  hygiene:
    name: Hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up go.work
        run: make workspace

      - name: Cache Go tools
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/go/bin
          key: go-tools-${{ runner.os }}-${{ hashFiles('Makefile') }}

      - name: Install tools
        run: make install-tools

      - name: Check formatting
        run: make fmt-check

      - name: Check module tidiness
        run: make tidy-check

      - name: Check orphaned TODOs
        run: make check-todos

      - name: Check replace directives
        run: make check-replace

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [hygiene]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up go.work
        run: make workspace

      - name: Cache Go tools
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/go/bin
          key: go-tools-${{ runner.os }}-${{ hashFiles('Makefile') }}

      - name: Install tools
        run: make install-tools

      - name: Run go vet
        run: make vet-all

      - name: Run golangci-lint
        run: make lint-all

  validate-release:
    name: Validate GoReleaser Config
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate GoReleaser config
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          args: check

  test:
    name: Test (${{ matrix.module }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint]
    strategy:
      matrix:
        include:
          - module: "."
            target: test-core
            flag: core
          - module: file
            target: test-file
            flag: file
          - module: syslog
            target: test-syslog
            flag: syslog
          - module: webhook
            target: test-webhook
            flag: webhook
          - module: cmd/audit-gen
            target: test-audit-gen
            flag: audit-gen
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up go.work
        run: make workspace

      - name: Run unit tests with coverage
        run: make ${{ matrix.target }}

      - name: Upload coverage
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: ${{ matrix.module }}/coverage.out
          flags: ${{ matrix.flag }}
          fail_ci_if_error: false

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up go.work
        run: make workspace

      - name: Start test infrastructure
        run: make test-infra-up

      - name: Run integration tests
        run: make test-integration

      - name: Stop test infrastructure
        if: always()
        run: make test-infra-down

  bdd:
    name: BDD Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up go.work
        run: make workspace

      - name: Start test infrastructure
        run: make test-infra-up

      - name: Run BDD tests
        run: make test-bdd

      - name: Stop test infrastructure
        if: always()
        run: make test-infra-down

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [hygiene]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up go.work
        run: make workspace

      - name: Cache Go tools
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/go/bin
          key: go-tools-${{ runner.os }}-${{ hashFiles('Makefile') }}

      - name: Install tools
        run: make install-tools

      - name: Run govulncheck
        run: make security

      - name: Verify go.sum integrity
        run: make verify

  cross-build:
    name: Cross Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up go.work
        run: make workspace

      - name: Build all platforms
        run: make build-all

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up go.work
        run: make workspace

      - name: Install benchstat
        run: make install-benchstat

      - name: Run benchmarks
        run: make bench

      - name: Compare against baseline
        if: hashFiles('bench-baseline.txt') != ''
        run: |
          if $(go env GOPATH)/bin/benchstat bench-baseline.txt bench.txt > /tmp/benchstat.out 2>&1; then
            echo "## Benchmark Comparison" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat /tmp/benchstat.out >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Benchmark Comparison" >> "$GITHUB_STEP_SUMMARY"
            echo "benchstat failed — baseline may be stale. Re-run \`make bench-save\` to update." >> "$GITHUB_STEP_SUMMARY"
          fi

  # benchmark is deliberately excluded from ci-pass — it is informational
  # (shows regressions in step summary) but does not gate merges.
  ci-pass:
    name: CI Pass
    runs-on: ubuntu-latest
    needs: [hygiene, lint, test, integration, bdd, security, cross-build, validate-release]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          if [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "One or more required jobs were cancelled"
            exit 1
          fi
          echo "All CI checks passed"
