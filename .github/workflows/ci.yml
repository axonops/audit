name: CI

on:
  push:
    branches: [main, 'feature/**', 'fix/**', 'chore/**']
  pull_request:
    branches: [main]
  workflow_call: {}
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  hygiene:
    name: Hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up go.work
        run: make workspace

      - name: Install tools
        run: make install-tools

      - name: Check formatting
        run: make fmt-check

      - name: Check module tidiness
        run: make tidy-check

      - name: Check orphaned TODOs
        run: make check-todos

      - name: Check replace directives
        run: make check-replace

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up go.work
        run: make workspace

      - name: Install tools
        run: make install-tools

      - name: Run go vet
        run: make vet-all

      - name: Run golangci-lint
        run: make lint-all

  validate-release:
    name: Validate GoReleaser Config
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate GoReleaser config
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          args: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Test (${{ matrix.module }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        include:
          - module: "."
            target: test-core
            flag: core
          - module: file
            target: test-file
            flag: file
          - module: syslog
            target: test-syslog
            flag: syslog
          - module: webhook
            target: test-webhook
            flag: webhook
          - module: yamlconfig
            target: test-yamlconfig
            flag: yamlconfig
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up go.work
        run: make workspace

      - name: Run unit tests with coverage
        run: cd ${{ matrix.module }} && go test -race -v -count=1 -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: ${{ matrix.module }}/coverage.out
          flags: ${{ matrix.flag }}
          fail_ci_if_error: false

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up go.work
        run: make workspace

      - name: Run integration tests
        run: make test-integration

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up go.work
        run: make workspace

      - name: Install tools
        run: make install-tools

      - name: Run govulncheck
        run: make security

      - name: Verify go.sum integrity
        run: make verify

  cross-build:
    name: Cross Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up go.work
        run: make workspace

      - name: Build all platforms
        run: make build-all

  ci-pass:
    name: CI Pass
    runs-on: ubuntu-latest
    needs: [hygiene, lint, test, integration, security, cross-build, validate-release]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          if [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "One or more required jobs were cancelled"
            exit 1
          fi
          echo "All CI checks passed"
