name: Dependency Update

# Nightly job that updates transitive Go dependencies across all modules.
# Dependabot handles direct dependency version bumps but misses transitive
# updates that `go get -u ./...` finds. This workflow fills that gap.
#
# Creates a single PR with all updates. If a PR already exists, it is
# updated in place. Human review is required before merge.
#
# NOTE on CI triggering: PRs created with GITHUB_TOKEN do not trigger
# on.pull_request workflows (GitHub's infinite-loop prevention). This
# workflow runs a smoke test (vet + lint + unit tests + build) inline
# before creating the PR. Full CI (integration, BDD) runs when a
# maintainer closes/reopens the PR or pushes an empty commit.
# To enable automatic full CI triggering, configure a GitHub App and
# set its token as the DEPENDENCY_UPDATE_TOKEN secret.

on:
  schedule:
    # 02:00 UTC daily — chosen to avoid overlap with Dependabot's Monday run
    - cron: '0 2 * * *'
  workflow_dispatch: {}

concurrency:
  group: dependency-update
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update-deps:
    name: Update Go Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Save pre-update go.mod files
        run: |
          for mod in . file syslog webhook loki outputconfig cmd/audit-gen secrets secrets/openbao; do
            cp "$mod/go.mod" "$mod/go.mod.before"
          done

      - name: Update dependencies per module
        run: |
          MODULES=". file syslog webhook loki outputconfig cmd/audit-gen secrets secrets/openbao"
          CORE_MODULE="github.com/axonops/go-audit"
          FAILED=""

          for mod in $MODULES; do
            echo ""
            echo "========================================"
            echo "Updating: $mod"
            echo "========================================"

            cd "$mod"

            # Capture the current inter-module versions so we can restore them.
            # Sub-modules pin each other at release versions managed by humans,
            # not by automated updates.
            PINNED_VERSIONS=""
            for dep in \
              "$CORE_MODULE" \
              "$CORE_MODULE/file" \
              "$CORE_MODULE/syslog" \
              "$CORE_MODULE/webhook" \
              "$CORE_MODULE/loki" \
              "$CORE_MODULE/outputconfig" \
              "$CORE_MODULE/cmd/audit-gen" \
              "$CORE_MODULE/secrets" \
              "$CORE_MODULE/secrets/openbao"; do
              ver=$(grep "^	$dep " go.mod 2>/dev/null | awk '{print $2}')
              if [ -n "$ver" ]; then
                PINNED_VERSIONS="$PINNED_VERSIONS $dep@$ver"
              fi
            done

            # Update all dependencies. Continue on failure — one module's
            # issue must not block updates to the others.
            if ! go get -u ./... 2>/tmp/goget-error-$$.txt; then
              echo "WARNING: go get -u failed for module $mod"
              cat /tmp/goget-error-$$.txt
              FAILED="$FAILED $mod"
              cd "$GITHUB_WORKSPACE"
              continue
            fi

            # Restore pinned inter-module versions. These are managed at
            # release time, not by nightly updates.
            if [ -n "$PINNED_VERSIONS" ]; then
              echo "Restoring inter-module pins:$PINNED_VERSIONS"
              # shellcheck disable=SC2086
              go get $PINNED_VERSIONS
            fi

            # Tidy to remove any unused entries.
            if ! go mod tidy 2>/tmp/tidy-error-$$.txt; then
              echo "WARNING: go mod tidy failed for module $mod"
              cat /tmp/tidy-error-$$.txt
              FAILED="$FAILED $mod"
              cd "$GITHUB_WORKSPACE"
              continue
            fi

            echo "OK: $mod updated successfully"
            cd "$GITHUB_WORKSPACE"
          done

          if [ -n "$FAILED" ]; then
            echo ""
            echo "WARNING: The following modules had errors:$FAILED"
            echo "Other modules were updated successfully."
          fi

      - name: Check for changes
        id: changes
        run: |
          MODULES=". file syslog webhook loki outputconfig cmd/audit-gen secrets secrets/openbao"
          HAS_CHANGES="false"

          for mod in $MODULES; do
            if [ -f "$mod/go.mod.before" ]; then
              if ! diff -q "$mod/go.mod.before" "$mod/go.mod" > /dev/null 2>&1; then
                HAS_CHANGES="true"
                break
              fi
            fi
          done

          echo "has_changes=$HAS_CHANGES" >> "$GITHUB_OUTPUT"

      # --- Smoke test: verify updated deps do not break the build ---
      # Runs vet, lint, unit tests, and cross-build on the updated tree.
      # Full integration/BDD tests run when CI triggers on the PR.

      - name: Set up go.work
        if: steps.changes.outputs.has_changes == 'true'
        run: make workspace

      - name: Cache Go tools
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/go/bin
          key: go-tools-${{ runner.os }}-${{ hashFiles('Makefile') }}

      - name: Install tools
        if: steps.changes.outputs.has_changes == 'true'
        run: make install-tools

      - name: Smoke test — vet
        if: steps.changes.outputs.has_changes == 'true'
        run: make vet-all

      - name: Smoke test — lint
        if: steps.changes.outputs.has_changes == 'true'
        run: make lint-all

      - name: Smoke test — unit tests
        if: steps.changes.outputs.has_changes == 'true'
        run: make test-all

      - name: Smoke test — cross-platform build
        if: steps.changes.outputs.has_changes == 'true'
        run: make build-all

      - name: Smoke test — govulncheck
        if: steps.changes.outputs.has_changes == 'true'
        run: make security

      # --- Generate PR description from go.mod diffs ---

      - name: Generate update summary
        id: summary
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          MODULES=". file syslog webhook loki outputconfig cmd/audit-gen secrets secrets/openbao"
          BODY=""

          for mod in $MODULES; do
            if [ ! -f "$mod/go.mod.before" ]; then
              continue
            fi

            if diff -q "$mod/go.mod.before" "$mod/go.mod" > /dev/null 2>&1; then
              continue
            fi

            MODULE_NAME="$mod"
            if [ "$mod" = "." ]; then
              MODULE_NAME="core"
            fi

            BODY="$BODY### Module: \`$MODULE_NAME\`\n\n"
            BODY="$BODY\`\`\`diff\n$(diff -u "$mod/go.mod.before" "$mod/go.mod" | tail -n +3)\n\`\`\`\n\n"
          done

          # Clean up .before files — they must not be committed.
          for mod in $MODULES; do
            rm -f "$mod/go.mod.before"
          done

          # Write body to a file to avoid shell quoting issues.
          {
            echo "## Dependency Updates"
            echo ""
            echo "Nightly \`go get -u ./...\` found transitive dependency updates"
            echo "that Dependabot does not cover."
            echo ""
            echo -e "$BODY"
            echo "### Smoke test results"
            echo ""
            echo "The following passed in this workflow run before the PR was created:"
            echo "- \`make vet-all\`"
            echo "- \`make lint-all\`"
            echo "- \`make test-all\` (unit tests with \`-race\`)"
            echo "- \`make build-all\` (linux/amd64, darwin/arm64, windows/amd64)"
            echo "- \`make security\` (govulncheck)"
            echo ""
            echo "---"
            echo ""
            echo "**Review checklist:**"
            echo "- [ ] Review the dependency diffs above for unexpected major version bumps"
            echo "- [ ] Close and reopen the PR to trigger full CI (integration + BDD tests)"
            echo "- [ ] Verify inter-module \`github.com/axonops/go-audit\` versions are unchanged"
            echo ""
            echo "*This PR was created automatically by the [nightly dependency update workflow](https://github.com/${{ github.repository }}/actions/workflows/dependency-update.yml).*"
          } > /tmp/pr-body.md

      # --- Create or update the PR ---

      - name: Create or update PR
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/nightly-dep-update
          delete-branch: true
          title: "chore(deps): nightly transitive dependency update"
          body-path: /tmp/pr-body.md
          commit-message: "chore(deps): update transitive Go dependencies"
          labels: dependencies
          # If a PR already exists on this branch, it is updated in place.
          # The branch is force-pushed with the new changes.
