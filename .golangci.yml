# golangci-lint configuration for go-audit
# See https://golangci-lint.run/usage/configuration/
version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    # Go toolchain defaults — explicitly listed for reproducibility
    # across golangci-lint version upgrades.
    - errcheck      # all error returns checked
    - govet         # go vet checks (configured below with enable-all)
    - staticcheck   # bugs, performance, deprecated API usage
    - unused        # unused code detection
    - ineffassign   # ineffective assignments
    # gosimple is bundled into staticcheck in golangci-lint v2 and
    # cannot be enabled separately.
    # typecheck is a built-in stage in golangci-lint, not a configurable
    # linter — it runs automatically and cannot be enabled/disabled.
    # Project-specific linters
    - errorlint     # correct error wrapping
    - revive        # comprehensive Go linter
    - gocritic      # opinionated checks
    - gocyclo       # cyclomatic complexity
    - gocognit      # cognitive complexity
    - godot         # godoc comment periods
    - godox         # detect TODO/FIXME without issue refs
    - prealloc      # slice preallocation
    - unconvert     # unnecessary type conversions
    - misspell      # spelling
    - nolintlint    # nolint directive hygiene
    - bodyclose     # HTTP response body close
    - nilerr        # returning nil when err is non-nil
    - tparallel     # test parallelism
    - thelper       # test helper detection
    - copyloopvar   # loop variable copy
    - exhaustive    # switch exhaustiveness on enums
    - wrapcheck     # errors from external packages must be wrapped
    - forcetypeassert # type assertions must use two-return form
    - cyclop        # alternative complexity checker
    - noctx         # http.NewRequest without context
    - rowserrcheck  # sql.Rows.Err() checked
    # Note: contextcheck is not a standard golangci-lint v2 linter
    # and is omitted. Context propagation is enforced by noctx and
    # manual review.

  settings:
    gocyclo:
      min-complexity: 10

    gocognit:
      min-complexity: 15

    cyclop:
      max-complexity: 10

    godox:
      keywords:
        - TODO
        - FIXME
        - BUG
        - HACK

    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
          disabled: true  # functional options pattern uses unused params
        - name: unreachable-code
        - name: redefines-builtin-id

    errorlint:
      errorf: true
      asserts: true
      comparison: true

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance

    govet:
      enable-all: true

  issues:
    max-issues-per-linter: 0
    max-same-issues: 0

  exclusions:
    rules:
      # Test files are allowed to use dot imports for testify.
      - path: _test\.go
        linters:
          - revive
        text: "dot-imports"

      # Test files can have longer functions.
      - path: _test\.go
        linters:
          - gocyclo
          - gocognit

      # Example test functions don't need to check all errors.
      - path: example_test\.go
        linters:
          - errcheck

      # Internal test helpers are never exposed to consumers.
      - path: internal/testhelper/
        linters:
          - revive
        text: "exported"

formatters:
  enable:
    - gofmt
    - goimports
