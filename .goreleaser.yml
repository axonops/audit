version: 2

git:
  # Ignore sub-module tags (file/v*, syslog/v*, etc.) — only use the
  # core v* tag for versioning. Sub-module tags are on different commits
  # by design (three-tier release process).
  ignore_tags:
    - "file/*"
    - "syslog/*"
    - "webhook/*"
    - "loki/*"
    - "outputconfig/*"
    - "outputs/*"
    - "cmd/*"
    - "secrets/*"

builds:
  - id: audit-gen
    dir: cmd/audit-gen
    binary: audit-gen
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    flags:
      - -trimpath
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
  - id: audit-validate
    dir: cmd/audit-validate
    binary: audit-validate
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    flags:
      - -trimpath
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}

before:
  hooks: []
  # Before hooks removed — GoReleaser checks out the core tag commit,
  # which has valid (though not latest-version) go.mod files. The build
  # works because all referenced module versions are published.

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^chore:'
      - '^docs:'
      - '^test:'
      - '^ci:'
  groups:
    - title: Breaking Changes
      regexp: '^.*!:'
      order: 0
    - title: Features
      regexp: '^feat'
      order: 1
    - title: Bug Fixes
      regexp: '^fix'
      order: 2
    - title: Security
      regexp: '^sec'
      order: 3
    - title: Refactoring
      regexp: '^refactor'
      order: 4

# SBOM publishing intentionally omitted — see #514 for rationale.
#
# This is a Go library; library consumers use `go get` against
# proxy.golang.org and rely on go.mod for their dependency manifest,
# which is the better SBOM-equivalent for libraries. The auxiliary
# CLI binaries (audit-gen, audit-validate) are operator tools rather
# than primary distribution artifacts. Build provenance for every
# released artifact is provided via GitHub build attestations
# (actions/attest-build-provenance, see release.yml job 2 and
# goreleaser.yml). Consumers verify with:
#
#     gh attestation verify <downloaded-artifact> --repo axonops/audit
#
# Operators wanting an SBOM of a downloaded binary can scan it
# locally with `syft scan <binary>`. The `make sbom` target produces
# a source-level SBOM for development purposes only.

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

# Sigstore keyless signing of the checksums file (#516).
#
# We sign checksums.txt — not every binary — because the checksum
# file is the cryptographic root of trust for every artifact in the
# release: a verified checksums.txt plus `sha256sum -c` extends the
# guarantee to every binary listed inside it. One signature pair
# (.sig + .pem) protects the entire release manifest.
#
# Identity: https://github.com/axonops/audit/.github/workflows/release.yml@refs/tags/<tag>
# Issuer:   https://token.actions.githubusercontent.com
# Rekor:    https://search.sigstore.dev/?logIndex=<index> — cosign
#           prints the index after signing; consumers can audit the
#           transparency-log entry independently of GitHub.
# Verify:   docs/releasing.md "Verify a Release with Cosign".
#
# `--yes` skips the keyless interactive prompt; cosign-installer
# in the release workflow makes the cosign binary available before
# this stanza runs.
signs:
  - cmd: cosign
    artifacts: checksum
    output: true
    certificate: '${artifact}.pem'
    args:
      - sign-blob
      - '--yes'
      - '--oidc-issuer=https://token.actions.githubusercontent.com'
      - '--output-certificate=${certificate}'
      - '--output-signature=${signature}'
      - '${artifact}'

release:
  github:
    owner: axonops
    name: audit
  draft: false
  prerelease: auto
  replace_existing_artifacts: true
  name_template: '{{ .Tag }}'
