version: 2

git:
  # Ignore sub-module tags (file/v*, syslog/v*, etc.) — only use the
  # core v* tag for versioning. Sub-module tags are on different commits
  # by design (three-tier release process).
  ignore_tags:
    - "file/*"
    - "syslog/*"
    - "webhook/*"
    - "loki/*"
    - "outputconfig/*"
    - "outputs/*"
    - "cmd/*"
    - "secrets/*"

builds:
  - id: audit-gen
    dir: cmd/audit-gen
    binary: audit-gen
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    flags:
      - -trimpath
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}

before:
  hooks: []
  # Before hooks removed — GoReleaser checks out the core tag commit,
  # which has valid (though not latest-version) go.mod files. The build
  # works because all referenced module versions are published.

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^chore:'
      - '^docs:'
      - '^test:'
      - '^ci:'
  groups:
    - title: Breaking Changes
      regexp: '^.*!:'
      order: 0
    - title: Features
      regexp: '^feat'
      order: 1
    - title: Bug Fixes
      regexp: '^fix'
      order: 2
    - title: Security
      regexp: '^sec'
      order: 3
    - title: Refactoring
      regexp: '^refactor'
      order: 4

sboms:
  - id: cyclonedx
    artifacts: archive
    documents:
      - >-
        {{ .ProjectName }}_{{ .Version }}_sbom.cdx.json
    cmd: syft
    args:
      - "${artifact}"
      - "--output"
      - "cyclonedx-json"
  - id: spdx
    artifacts: archive
    documents:
      - >-
        {{ .ProjectName }}_{{ .Version }}_sbom.spdx.json
    cmd: syft
    args:
      - "${artifact}"
      - "--output"
      - "spdx-json"

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

release:
  github:
    owner: axonops
    name: audit
  draft: false
  prerelease: auto
  name_template: '{{ .Tag }}'
