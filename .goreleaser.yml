version: 2

# go-audit is a library, not a CLI — no binary builds needed.
# GoReleaser is used for changelog generation and GitHub releases only.
builds: []

before:
  hooks:
    - go mod tidy
    - bash -c "cd file && go mod tidy"
    - bash -c "cd syslog && go mod tidy"
    - bash -c "cd webhook && go mod tidy"
    - bash -c "cd taxonomy && go mod tidy"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^chore:'
      - '^docs:'
      - '^test:'
      - '^ci:'
  groups:
    - title: Breaking Changes
      regexp: '^.*!:'
      order: 0
    - title: Features
      regexp: '^feat'
      order: 1
    - title: Bug Fixes
      regexp: '^fix'
      order: 2
    - title: Security
      regexp: '^sec'
      order: 3
    - title: Refactoring
      regexp: '^refactor'
      order: 4

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

release:
  github:
    owner: axonops
    name: go-audit
  draft: false
  prerelease: auto
  name_template: '{{ .Tag }}'
