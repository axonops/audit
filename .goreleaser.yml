version: 2

builds:
  - id: audit-gen
    dir: cmd/audit-gen
    binary: audit-gen
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    flags:
      - -trimpath
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}

before:
  hooks:
    - go mod tidy
    - bash -c "cd file && go mod tidy"
    - bash -c "cd syslog && go mod tidy"
    - bash -c "cd webhook && go mod tidy"
    - bash -c "cd loki && go mod tidy"
    - bash -c "cd outputconfig && go mod tidy"
    - bash -c "cd cmd/audit-gen && go mod tidy"
    - bash -c "cd secrets && go mod tidy"
    - bash -c "cd secrets/openbao && go mod tidy"
    - bash -c "cd secrets/vault && go mod tidy"
    - bash -c "cd examples/16-crud-api && go mod tidy"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^chore:'
      - '^docs:'
      - '^test:'
      - '^ci:'
  groups:
    - title: Breaking Changes
      regexp: '^.*!:'
      order: 0
    - title: Features
      regexp: '^feat'
      order: 1
    - title: Bug Fixes
      regexp: '^fix'
      order: 2
    - title: Security
      regexp: '^sec'
      order: 3
    - title: Refactoring
      regexp: '^refactor'
      order: 4

sboms:
  - id: cyclonedx
    artifacts: archive
    documents:
      - >-
        {{ .ProjectName }}_{{ .Version }}_sbom.cdx.json
    cmd: syft
    args:
      - "${artifact}"
      - "--output"
      - "cyclonedx-json"
  - id: spdx
    artifacts: archive
    documents:
      - >-
        {{ .ProjectName }}_{{ .Version }}_sbom.spdx.json
    cmd: syft
    args:
      - "${artifact}"
      - "--output"
      - "spdx-json"

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

release:
  github:
    owner: axonops
    name: go-audit
  draft: false
  prerelease: auto
  name_template: '{{ .Tag }}'
