version: 1

sensitivity:
  labels:
    pii:
      description: "Personally identifiable information"
      fields: [email]
    financial:
      description: "Financial and payment data"
      fields: [card_number]

categories:
  write:
    - user_create

events:
  user_create:
    description: "A new user was created"
    fields:
      outcome: {required: true}
      email:
        labels: [pii]
      card_number:
        labels: [financial]

default_enabled:
  - write
