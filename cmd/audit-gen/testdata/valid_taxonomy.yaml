version: 1
categories:
  read:
    - schema_read
    - config_read
  write:
    - schema_register
    - schema_delete
  security:
    - auth_failure
default_enabled:
  - write
  - security
events:
  schema_read:
    fields:
      outcome:
        required: true
      subject: {}
  config_read:
    fields:
      outcome:
        required: true
  schema_register:
    description: "A new schema version was registered in the registry"
    fields:
      outcome:
        required: true
      actor_id:
        required: true
      subject:
        required: true
      schema_type: {}
  schema_delete:
    description: "A schema was permanently deleted"
    fields:
      outcome:
        required: true
      actor_id:
        required: true
      subject:
        required: true
  auth_failure:
    description: "An authentication attempt failed"
    fields:
      outcome:
        required: true
      actor_id:
        required: true
      reason: {}
      client_ip: {}
