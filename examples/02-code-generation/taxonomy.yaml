version: 1

categories:
  write:
    - user_create
    - user_delete
  read:
    - user_read
  security:
    - auth_failure
    - auth_success

events:
  user_create:
    description: "A new user account was created"
    fields:
      outcome:
        required: true
      actor_id:
        required: true
      target_id:
      reason:

  user_delete:
    description: "A user account was deleted"
    fields:
      outcome:
        required: true
      actor_id:
        required: true
      target_id:

  user_read:
    description: "A user profile was viewed"
    fields:
      outcome:
        required: true
      actor_id:

  auth_failure:
    description: "An authentication attempt failed"
    fields:
      outcome:
        required: true
      actor_id:
        required: true
      reason:
      source_ip:

  auth_success:
    description: "An authentication attempt succeeded"
    fields:
      outcome:
        required: true
      actor_id:
        required: true
      source_ip:
