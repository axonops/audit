version: 1

categories:
  write:
    severity: 3
    events:
      - user_create
      - user_delete
  read:
    severity: 1
    events:
      - user_read
  security:
    severity: 8
    events:
      - auth_failure
      - auth_success

events:
  user_create:
    description: "A new user account was created"
    fields:
      outcome:
        required: true
      actor_id:
        required: true

  user_delete:
    description: "A user account was deleted"
    fields:
      outcome:
        required: true
      actor_id:
        required: true

  user_read:
    description: "A user profile was viewed"
    fields:
      outcome:
        required: true

  auth_failure:
    description: "An authentication attempt failed"
    fields:
      outcome:
        required: true
      actor_id:
        required: true

  auth_success:
    description: "An authentication attempt succeeded"
    fields:
      outcome:
        required: true
      actor_id:
        required: true
