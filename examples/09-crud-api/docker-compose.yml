services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: audit_demo
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d audit_demo"]
      interval: 2s
      timeout: 5s
      retries: 10

  syslog-ng:
    image: balabit/syslog-ng:4.2.0
    volumes:
      - ../../tests/bdd/docker/syslog-ng/syslog-ng.conf:/etc/syslog-ng/syslog-ng.conf:ro
    ports:
      - "127.0.0.1:5514:5514"
    healthcheck:
      test: ["CMD-SHELL", "syslog-ng-ctl stats || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 5

  webhook-receiver:
    build:
      context: ../../tests/bdd/docker/webhook-receiver
    ports:
      - "127.0.0.1:8081:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/"]
      interval: 2s
      timeout: 3s
      retries: 5
