# audit Inventory Demo (Capstone)
#
# Services:
#   app        — inventory management API with audit logging
#   postgres   — application database
#   loki       — audit event storage for Grafana queries
#   prometheus — scrapes /metrics for pipeline health dashboards
#   grafana    — pre-provisioned dashboards at http://localhost:3000
#
# Usage:
#   docker compose up -d                              # start everything
#   open http://localhost:8080                        # web UI
#   open http://localhost:3000/d/audit-events/        # audit events (Loki)
#   open http://localhost:3000/d/audit-metrics/       # pipeline metrics (Prometheus)
#   docker compose down -v                            # clean up

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      DATABASE_URL: postgres://demo:demo@postgres:5432/audit_demo?sslmode=disable
      LOKI_URL: http://loki:3100/loki/api/v1/push
      AUDIT_LOG_PATH: /data/audit.log
      SECURITY_LOG_PATH: /data/security.log
    volumes:
      - audit-logs:/data
    depends_on:
      postgres:
        condition: service_healthy
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 3s
      timeout: 2s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: audit_demo
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d audit_demo"]
      interval: 2s
      timeout: 5s
      retries: 10

  loki:
    image: grafana/loki:3.0.0
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 10s

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 3s
      timeout: 2s
      retries: 10

  grafana:
    image: grafana/grafana:11.0.0
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/audit-events.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      loki:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 3s
      timeout: 2s
      retries: 10

volumes:
  pgdata:
  audit-logs:
