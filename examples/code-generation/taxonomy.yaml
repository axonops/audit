version: 1

categories:
  write:
    - user_create
    - user_delete
  read:
    - user_read
  security:
    - auth_failure
    - auth_success

default_enabled:
  - write
  - read
  - security

events:
  user_create:
    description: "A new user account was created"
    required:
      - outcome
      - actor_id
    optional:
      - target_id
      - reason

  user_delete:
    description: "A user account was deleted"
    required:
      - outcome
      - actor_id
    optional:
      - target_id

  user_read:
    description: "A user profile was viewed"
    required:
      - outcome
    optional:
      - actor_id

  auth_failure:
    description: "An authentication attempt failed"
    required:
      - outcome
      - actor_id
    optional:
      - reason
      - source_ip

  auth_success:
    description: "An authentication attempt succeeded"
    required:
      - outcome
      - actor_id
    optional:
      - source_ip
