version: 1
outputs:
  console:
    type: stdout

  audit_log:
    type: file
    file:
      path: "${AUDIT_LOG_PATH:-./audit.log}"
      max_size_mb: 100
      max_backups: 5
      permissions: "0600"
    route:
      exclude_categories:
        - read

  admin_log:
    type: file
    file:
      path: "${ADMIN_LOG_PATH:-./admin-audit.log}"
      max_size_mb: 50
      permissions: "0600"
    route:
      include_categories:
        - admin
    formatter:
      type: cef
      vendor: "AxonOps"
      product: "CRUDExample"
      version: "0.1.0"

  syslog_security:
    type: syslog
    syslog:
      network: tcp
      address: "${SYSLOG_ADDR:-localhost:5514}"
      app_name: crud-api
    route:
      include_categories:
        - security

  # The webhook output is created programmatically in audit_setup.go
  # because the dev environment uses plain HTTP (AllowInsecureHTTP),
  # which cannot be set via YAML — by design, insecure options require
  # the programmatic API. In production with HTTPS, you would add:
  #
  #   webhook_siem:
  #     type: webhook
  #     webhook:
  #       url: "https://siem.example.com/events"
  #       batch_size: 50
  #       flush_interval: "5s"
  #       timeout: "10s"
  #       max_retries: 3
