version: 1

categories:
  write:
    - user_create
  read:
    - user_read
  security:
    severity: 8
    events:
      - auth_failure

default_enabled:
  - write
  - read
  - security

events:
  user_create:
    description: "A new user account was created"
    required:
      - outcome
      - actor_id

  user_read:
    description: "A user profile was viewed"
    required:
      - outcome

  auth_failure:
    description: "An authentication attempt failed"
    required:
      - outcome
      - actor_id
