version: 1

categories:
  write:
    - user_create
  security:
    - auth_failure
    - auth_success

default_enabled:
  - write
  - security

events:
  user_create:
    description: "A new user account was created"
    required:
      - outcome
      - actor_id

  auth_failure:
    description: "An authentication attempt failed"
    required:
      - outcome
      - actor_id

  auth_success:
    description: "An authentication attempt succeeded"
    required:
      - outcome
      - actor_id
