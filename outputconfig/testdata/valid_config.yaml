version: 1
app_name: test-app
host: test-host
default_formatter:
  type: json
  timestamp: rfc3339nano
outputs:
  console:
    type: stdout
  audit_log:
    type: file
    file:
      path: "${AUDIT_TEST_DIR}/audit.log"
      permissions: "0600"
    route:
      include_categories:
        - write
        - security
