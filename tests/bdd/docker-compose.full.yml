# Full test infrastructure for go-audit integration and BDD tests.
# Combines syslog-ng, webhook receiver, and Loki for fan-out testing.
#
# Usage (from repo root):
#   make test-infra-up    # creates network + starts all services
#   make test-infra-down  # stops services + removes network

include:
  - docker-compose.syslog.yml
  - docker-compose.webhook.yml
  - docker-compose.loki.yml
  - docker-compose.openbao.yml
  - docker-compose.vault.yml
