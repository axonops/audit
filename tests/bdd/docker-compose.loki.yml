services:
  loki:
    image: grafana/loki:3.0.0@sha256:757b5fadf816a1396f1fea598152947421fa49cb8b2db1ddd2a6e30fae003253
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./docker/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
    networks:
      - audit-test
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 10s

networks:
  audit-test:
    external: true
