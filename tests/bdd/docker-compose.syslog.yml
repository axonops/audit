# syslog-ng service for audit integration tests.
#
# Listeners:
#   5514 — TCP plain
#   5515 — UDP
#   6514 — TCP+TLS (server cert from test CA)
#   6515 — TCP+mTLS (require client cert verified against test CA)
#
# Received messages are written to the syslog-logs volume at
# /var/log/syslog-ng/audit.log for test verification.

services:
  syslog-ng:
    image: balabit/syslog-ng:4.2.0
    ports:
      - "127.0.0.1:5514:5514"     # TCP plain
      - "127.0.0.1:5515:5515/udp" # UDP
      - "127.0.0.1:6514:6514"     # TCP+TLS
      - "127.0.0.1:6515:6515"     # TCP+mTLS
    volumes:
      - ./docker/syslog-ng/syslog-ng.conf:/etc/syslog-ng/syslog-ng.conf:ro
      - ../testdata/certs/server.crt:/etc/syslog-ng/certs/server.crt:ro
      - ../testdata/certs/server.key:/etc/syslog-ng/certs/server.key:ro
      - ../testdata/certs/ca.crt:/etc/syslog-ng/certs/ca.crt:ro
      - syslog-logs:/var/log/syslog-ng
    networks:
      - audit-test
    healthcheck:
      # Verify the daemon is up AND all 4 sources plus the file
      # destination are registered. The previous test (just
      # `syslog-ng-ctl stats`) returned success while sources were
      # still binding, so docker compose --wait could declare the
      # service healthy before the first BDD scenario could send
      # an event reliably (#569). Now we count source/destination
      # entries — must see all 4 sources (s_tcp, s_udp, s_tls,
      # s_mtls) and the d_audit destination.
      test:
        - "CMD-SHELL"
        - "out=$$(syslog-ng-ctl stats 2>&1) && echo \"$$out\" | grep -q 's_tcp' && echo \"$$out\" | grep -q 's_udp' && echo \"$$out\" | grep -q 's_tls' && echo \"$$out\" | grep -q 's_mtls' && echo \"$$out\" | grep -q 'd_audit'"
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  syslog-logs:

networks:
  audit-test:
    external: true
