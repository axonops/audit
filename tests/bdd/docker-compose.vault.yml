# HashiCorp Vault dev server with TLS for secret provider BDD and integration tests.
# Uses -dev-tls mode: auto-unsealed, in-memory storage, self-signed TLS certs.
# Certs are generated at /opt/vault/tls/ inside the container.
# Port 8210 to avoid conflict with OpenBao on 8200.
#
# Extract the CA cert for test clients:
#   docker cp bdd-vault-1:/opt/vault/tls/tls-ca.pem /tmp/vault-ca.pem

services:
  vault:
    image: hashicorp/vault:1.18
    command: server -dev-tls
    ports:
      - "8210:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: test-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "sh", "-c", "VAULT_ADDR=https://127.0.0.1:8200 VAULT_SKIP_VERIFY=true vault status"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s
    networks:
      - audit-test

networks:
  audit-test:
    external: true
