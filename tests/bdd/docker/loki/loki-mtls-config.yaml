# Loki configuration for mutual TLS (mTLS) testing.
# Server presents its certificate; client MUST present a certificate
# signed by the test CA. Uses RequireAndVerifyClientCert to ensure
# full mutual authentication — not just certificate presence.

auth_enabled: true

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn
  http_tls_config:
    cert_file: /etc/loki/certs/server.crt
    key_file: /etc/loki/certs/server.key
    client_auth_type: RequireAndVerifyClientCert
    client_ca_file: /etc/loki/certs/ca.crt
  grpc_tls_config:
    cert_file: /etc/loki/certs/server.crt
    key_file: /etc/loki/certs/server.key
    client_auth_type: RequireAndVerifyClientCert
    client_ca_file: /etc/loki/certs/ca.crt

analytics:
  reporting_enabled: false

common:
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory
  replication_factor: 1
  path_prefix: /tmp/loki

schema_config:
  configs:
    - from: "2024-01-01"
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  filesystem:
    directory: /tmp/loki/chunks

limits_config:
  reject_old_samples: false
  allow_structured_metadata: false
  ingestion_rate_mb: 100
  ingestion_burst_size_mb: 200

compactor:
  working_directory: /tmp/loki/compactor
