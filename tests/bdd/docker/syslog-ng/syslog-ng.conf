# syslog-ng configuration for go-audit integration and BDD tests.
#
# Four listeners:
#   TCP plain  — port 5514
#   UDP        — port 5515
#   TCP+TLS    — port 6514 (server cert from test CA)
#   TCP+mTLS   — port 6515 (server cert + require client cert)
#
# All received messages are written to /var/log/syslog-ng/audit.log
# which is mounted as a Docker volume for test verification.

@version: 4.2
@include "scl.conf"

# --- Sources ---

# TCP plain text
source s_tcp {
    network(
        transport("tcp")
        port(5514)
    );
};

# UDP
source s_udp {
    network(
        transport("udp")
        port(5515)
    );
};

# TCP + TLS (server authentication only)
source s_tls {
    network(
        transport("tls")
        port(6514)
        tls(
            key-file("/etc/syslog-ng/certs/server.key")
            cert-file("/etc/syslog-ng/certs/server.crt")
            ca-file("/etc/syslog-ng/certs/ca.crt")
            peer-verify(optional-untrusted)
        )
    );
};

# TCP + mTLS (mutual authentication — require client cert)
source s_mtls {
    network(
        transport("tls")
        port(6515)
        tls(
            key-file("/etc/syslog-ng/certs/server.key")
            cert-file("/etc/syslog-ng/certs/server.crt")
            ca-file("/etc/syslog-ng/certs/ca.crt")
            peer-verify(required-trusted)
        )
    );
};

# --- Destination ---

# Write all received messages to a single file for test verification.
# The $MSG macro contains the raw RFC 5424 message including the
# <PRI> prefix, which BDD tests use for severity mapping verification.
destination d_audit {
    file("/var/log/syslog-ng/audit.log"
        create-dirs(yes)
        template("${MSG}\n")
    );
};

# --- Log paths ---

log { source(s_tcp);  destination(d_audit); };
log { source(s_udp);  destination(d_audit); };
log { source(s_tls);  destination(d_audit); };
log { source(s_mtls); destination(d_audit); };
